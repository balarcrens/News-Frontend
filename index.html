<!doctype html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>The Chronicle | Breaking News & Global Headlines</title>
    <meta name="description"
        content="The Chronicle delivers breaking news, world headlines, technology updates, business insights, and in-depth journalism." />
    <meta name="keywords"
        content="breaking news, world news, india news, politics, technology, business, global headlines" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="The Chronicle Team" />

    <!-- Canonical -->
    <link rel="canonical" href="https://thechronicle.com/" />

    <!-- Language / Geo -->
    <meta name="language" content="English">
    <meta name="geo.region" content="IN">
    <meta name="geo.placename" content="India">

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">

    <!-- Open Graph (Facebook / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Chronicle" />
    <meta property="og:title" content="The Chronicle | Breaking News & Global Headlines" />
    <meta property="og:description" content="Stay updated with breaking news, world stories, and trusted journalism." />
    <meta property="og:url" content="https://thechronicle.com/" />
    <meta property="og:image" content="https://thechronicle.com/preview.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="The Chronicle | Global News">
    <meta name="twitter:description" content="Breaking news, analysis, and stories from around the world.">
    <meta name="twitter:image" content="https://thechronicle.com/preview.jpg">

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Premium Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Structured Data (Organization) -->
    <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsMediaOrganization",
    "name": "The Chronicle",
    "url": "https://thechronicle.com",
    "logo": {
      "@type": "ImageObject",
      "url": "https://thechronicle.com/logo.png"
    },
    "sameAs": [
      "https://facebook.com/thechronicle",
      "https://twitter.com/thechronicle",
      "https://instagram.com/thechronicle"
    ]
  }
  </script>

</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
