<!doctype html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Nexora News - Latest News, Breaking Headlines & Updates</title>
    <meta name="description"
        content="Stay updated with Nexora News - latest breaking news, technology, business, world news and trending stories." />
    <meta name="keywords"
        content="latest news, breaking news, tech news, india news, world news, business news, Nexora News" />
    <meta name="author" content="Nexora News" />

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display&display=swap"
        rel="stylesheet">

    <!-- Canonical -->
    <link rel="canonical" href="https://nexoranews.dpdns.org/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme (Dark + Accent Ready) -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark light" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="Nexora News - Latest Updates" />
    <meta property="og:description"
        content="Read the latest breaking news, tech updates, business insights and world stories on Nexora News." />
    <meta property="og:image" content="https://nexoranews.dpdns.org/og-image.jpeg" />
    <meta property="og:url" content="https://nexoranews.dpdns.org/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nexora News" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nexora News - Breaking News & Updates" />
    <meta name="twitter:description"
        content="Stay updated with breaking news, tech, business and world updates on Nexora News." />
    <meta name="twitter:image" content="https://nexoranews.dpdns.org/og-image.jpeg" />
    <meta name="twitter:site" content="@nexoranews" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Verification -->
    <meta name="google-site-verification" content="GHQU22rzrt_3N3zODC-19p3HI8NrwVMEBJ0cphM1nT4" />

    <!-- Adsense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2791325015173516"
        crossorigin="anonymous"></script>

    <!-- Structured Data -->
    <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsMediaOrganization",
    "name": "Nexora News",
    "url": "https://nexoranews.dpdns.org",
    "logo": {
      "@type": "ImageObject",
      "url": "https://nexoranews.dpdns.org/logo.png"
    }
  }
  </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
